<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TableFlow</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="navbar">
    <div class="brand">TableFlow</div>
    <div class="nav-links">
      <a href="{{ url_for('dashboard') }}">Panel</a>
      <a href="{{ url_for('menu') }}">Menú</a>
      <a href="{{ url_for('orders') }}">Todas las órdenes</a>
      <a href="{{ url_for('logout') }}">Cerrar sesión</a>
    </div>
  </nav>

  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-stack">
          {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <div id="notification-toast" class="notification-toast hidden"></div>

  <script>
    const token = "{{ session.get('token', '') }}";
    const toast = document.getElementById("notification-toast");

    function showToast(title, message) {
      if (!toast) return;
      toast.innerHTML = `<strong>${title}</strong><br>${message || ""}`;
      toast.classList.remove("hidden");
      setTimeout(() => toast.classList.add("hidden"), 3500);
    }

    if (token) {
      try {
        const ws = new WebSocket(`ws://localhost:8000/ws/notifications?token=${token}`);
        ws.onmessage = (event) => {
          const payload = JSON.parse(event.data);
          showToast(payload.title || "Notificación", payload.message || "");
        };
        ws.onopen = () => {
          setInterval(() => {
            if (ws.readyState === WebSocket.OPEN) {
              ws.send("ping");
            }
          }, 15000);
        };
      } catch (error) {
        console.error(error);
      }
    }
  </script>
</body>
</html>
